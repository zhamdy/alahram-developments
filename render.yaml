services:
  - type: web
    name: alahram-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:api && npm run db:seed
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: alahram-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
