name = "alahram-developments"
compatibility_date = "2024-12-01"

# Cloudflare Pages project
# Deploy command: npx wrangler pages deploy dist/alahram-developments/browser/

# KV namespace binding for form submissions
# After creating the namespace with:
#   npx wrangler kv namespace create FORM_DATA
# Replace the id below with the actual namespace ID
[[kv_namespaces]]
binding = "FORM_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
