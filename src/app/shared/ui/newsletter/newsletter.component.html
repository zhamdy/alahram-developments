<div *transloco="let t">
  @if (!submitted()) {
    <div>
      <h3 class="footer-heading">{{ t('newsletter.title') }}</h3>
      <p class="mb-3 text-sm opacity-80">{{ t('newsletter.description') }}</p>
      <form (ngSubmit)="onSubmit()" class="flex gap-2">
        <input
          type="email"
          [placeholder]="t('newsletter.placeholder')"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          required
          [disabled]="loading()"
          class="flex-1 rounded-lg border border-white/20 bg-white/10 px-3 py-2 text-sm text-white placeholder:text-white/50 focus:border-primary focus:outline-none disabled:opacity-50"
        />
        <button
          type="submit"
          [disabled]="loading()"
          class="shrink-0 rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90 disabled:opacity-50"
        >
          @if (loading()) {
            <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-current border-t-transparent"></span>
          } @else {
            {{ t('newsletter.subscribe') }}
          }
        </button>
      </form>
      @if (error()) {
        <p class="mt-2 text-sm text-red-400">{{ t('newsletter.error') }}</p>
      }
    </div>
  } @else {
    <div>
      <h3 class="footer-heading">{{ t('newsletter.title') }}</h3>
      <p class="text-sm opacity-80">{{ t('newsletter.success') }}</p>
    </div>
  }
</div>
