<section *transloco="let t" class="section-spacing">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 flex items-end justify-between">
      <div>
        <h2 class="font-display text-3xl font-bold md:text-4xl">
          {{ t('home.gallery.title') }}
        </h2>
        <p class="mt-4 text-muted-foreground">
          {{ t('home.gallery.subtitle') }}
        </p>
      </div>
      <a
        [routerLink]="'/gallery' | localizeRoute"
        class="link-underline hidden items-center gap-1 text-sm font-semibold text-primary sm:inline-flex"
      >
        {{ t('home.gallery.viewMore') }}
        <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
      </a>
    </div>

    <div ahramAnimate="fade-up" [animateDelay]="0.2" class="gallery-swiper overflow-hidden">
      <swiper-container
        init="false"
        slides-per-view="2"
        space-between="16"
        navigation="true"
        loop="true"
        autoplay-delay="3000"
        autoplay-disable-on-interaction="false"
        breakpoints='{"640":{"slidesPerView":3},"1024":{"slidesPerView":4},"1280":{"slidesPerView":5}}'
      >
        @for (item of galleryImages(); track item.id) {
          <swiper-slide>
            <div class="img-zoom relative aspect-square overflow-hidden rounded-xl bg-muted">
              <img
                [ngSrc]="item.imageUrl"
                [alt]="item.caption || item.projectName || ''"
                ahramFallback
                fill
                ngSrcset="256w, 384w, 512w"
                sizes="(max-width: 640px) 50vw, (max-width: 1024px) 33vw, (max-width: 1280px) 25vw, 20vw"
                class="object-cover"
              />
            </div>
          </swiper-slide>
        }
      </swiper-container>
    </div>

    <div class="mt-6 text-center sm:hidden">
      <a
        [routerLink]="'/gallery' | localizeRoute"
        class="link-underline inline-flex items-center gap-1 text-sm font-semibold text-primary"
      >
        {{ t('home.gallery.viewMore') }}
        <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
      </a>
    </div>
  </div>
</section>
