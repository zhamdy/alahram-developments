<section *transloco="let t" class="py-16 md:py-24">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 flex items-end justify-between">
      <div>
        <h2 class="font-display text-3xl font-bold md:text-4xl">
          {{ t('home.gallery.title') }}
        </h2>
        <p class="mt-4 text-muted-foreground">
          {{ t('home.gallery.subtitle') }}
        </p>
      </div>
      <a
        [routerLink]="'/gallery' | localizeRoute"
        class="link-underline hidden items-center gap-1 text-sm font-semibold text-primary sm:inline-flex"
      >
        {{ t('home.gallery.viewMore') }}
        <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
      </a>
    </div>

    <div ahramAnimate="fade-up" [animateDelay]="0.2" class="gallery-scroll flex gap-4 overflow-x-auto pb-4">
      @for (item of galleryImages; track item.id) {
        <div class="img-zoom relative aspect-square w-64 shrink-0 overflow-hidden rounded-xl bg-muted sm:w-72">
          <img
            [ngSrc]="item.src"
            [alt]="t(item.alt)"
            ahramFallback
            fill
            ngSrcset="256w, 384w, 512w"
            sizes="288px"
            class="object-cover"
          />
        </div>
      }
    </div>

    <div class="mt-6 text-center sm:hidden">
      <a
        [routerLink]="'/gallery' | localizeRoute"
        class="link-underline inline-flex items-center gap-1 text-sm font-semibold text-primary"
      >
        {{ t('home.gallery.viewMore') }}
        <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
      </a>
    </div>
  </div>
</section>
