<section *transloco="let t" class="section-spacing-lg">
  <div class="container px-4">

    <!-- Editorial header -->
    <div ahramAnimate="fade-up" class="mb-16 flex flex-col items-center text-center">
      <span class="eyebrow">{{ t('home.whyUs.eyebrow') }}</span>
      <h2 class="section-title-xl mt-3">{{ t('home.whyUs.title') }}</h2>
      <span class="editorial-rule mx-auto mt-5"></span>
      <p class="mx-auto mt-6 max-w-2xl text-lg text-muted-foreground">
        {{ t('home.whyUs.subtitle') }}
      </p>
    </div>

    <!-- Pillar cards — horizontal layout -->
    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-4">
      @for (pillar of pillars; track pillar.id; let i = $index) {
        <div
          ahramAnimate="fade-up"
          [animateDelay]="i * 0.12"
          class="pillar-card group relative flex flex-col overflow-hidden rounded-2xl border border-border bg-card p-7 shadow-sm transition-all duration-300 hover:-translate-y-1.5 hover:border-primary/30 hover:shadow-lg"
        >
          <!-- Accent corner -->
          <div class="absolute -end-8 -top-8 h-20 w-20 rounded-full bg-primary/5 transition-transform duration-500 group-hover:scale-150 group-hover:bg-primary/8"></div>

          <!-- Icon -->
          <div class="icon-float mb-5 flex h-14 w-14 items-center justify-center rounded-xl bg-primary/10 text-primary">
            <svg [lucideIcon]="pillar.icon" class="h-7 w-7"></svg>
          </div>

          <!-- Number badge -->
          <span class="mb-2 font-display text-4xl font-bold text-primary/20 leading-none">0{{ i + 1 }}</span>

          <h3 class="font-display text-lg font-bold tracking-tight">
            {{ t(pillar.titleKey) }}
          </h3>
          <span class="editorial-rule mt-3"></span>
          <p class="mt-4 text-sm leading-relaxed text-muted-foreground">
            {{ t(pillar.descriptionKey) }}
          </p>
        </div>
      }
    </div>

  </div>
</section>
