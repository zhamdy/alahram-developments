<section *transloco="let t" class="bg-muted/50 py-16 md:py-24">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 text-center">
      <h2 class="font-display text-3xl font-bold md:text-4xl">
        {{ t('home.whyUs.title') }}
      </h2>
      <p class="mt-4 text-muted-foreground">
        {{ t('home.whyUs.subtitle') }}
      </p>
    </div>

    <div class="grid gap-8 grid-cols-2 sm:grid-cols-2 lg:grid-cols-4">
      @for (pillar of pillars; track pillar.id; let i = $index) {
        <div
          ahramAnimate="fade-up"
          [animateDelay]="i * 0.1"
          class="card-hover rounded-xl bg-card p-6 text-center shadow-sm"
        >
          <div
            class="icon-float mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary/10"
          >
            <svg [lucideIcon]="pillar.icon" class="h-7 w-7 text-primary"></svg>
          </div>
          <h3 class="font-display text-lg font-semibold">
            {{ t(pillar.titleKey) }}
          </h3>
          <p class="mt-2 text-sm text-muted-foreground">
            {{ t(pillar.descriptionKey) }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
