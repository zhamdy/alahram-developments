<section *transloco="let t" class="section-spacing-lg overflow-hidden">
  <div class="container px-4">

    <div class="grid gap-16 lg:grid-cols-[2fr_3fr] lg:items-start lg:gap-24">

      <!-- Left: sticky editorial header -->
      <div ahramAnimate="fade-up" class="flex flex-col lg:sticky lg:top-32">
        <span class="eyebrow">{{ t('home.whyUs.eyebrow') }}</span>
        <h2 class="section-title-xl mt-4">{{ t('home.whyUs.title') }}</h2>
        <span class="editorial-rule mt-6"></span>
        <p class="mt-8 text-lg leading-relaxed text-muted-foreground">
          {{ t('home.whyUs.subtitle') }}
        </p>
      </div>

      <!-- Right: numbered pillar rows -->
      <div class="divide-y divide-border">
        @for (pillar of pillars; track pillar.id; let i = $index) {
          <div
            ahramAnimate="fade-up"
            [animateDelay]="i * 0.1"
            class="group -mx-4 grid grid-cols-[3rem_1fr] gap-x-5 rounded-xl px-4 py-8 transition-colors duration-300 hover:bg-muted/40"
          >
            <!-- Ghost number -->
            <span class="pt-1 font-display text-5xl font-bold leading-none text-primary/10 transition-colors duration-300 group-hover:text-primary/25 select-none">
              0{{ i + 1 }}
            </span>

            <!-- Content -->
            <div class="flex flex-col">
              <div class="mb-4 flex h-11 w-11 items-center justify-center rounded-xl bg-primary/10 text-primary transition-all duration-300 group-hover:bg-primary group-hover:text-white">
                <svg [lucideIcon]="pillar.icon" class="h-5 w-5"></svg>
              </div>
              <h3 class="font-display text-xl font-bold tracking-tight">
                {{ t(pillar.titleKey) }}
              </h3>
              <p class="mt-2 text-sm leading-relaxed text-muted-foreground">
                {{ t(pillar.descriptionKey) }}
              </p>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
</section>
