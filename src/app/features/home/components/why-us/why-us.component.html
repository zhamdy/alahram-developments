<section *transloco="let t" class="bg-muted/40 section-spacing">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-16 text-center">
      <h2 class="font-display text-4xl font-bold md:text-5xl">
        {{ t('home.whyUs.title') }}
      </h2>
      <div class="mx-auto mt-4 h-1 w-20 rounded-full bg-primary/40"></div>
      <p class="mx-auto mt-6 max-w-2xl text-lg text-muted-foreground">
        {{ t('home.whyUs.subtitle') }}
      </p>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4 lg:gap-8">
      @for (pillar of pillars; track pillar.id; let i = $index) {
        <div
          ahramAnimate="fade-up"
          [animateDelay]="i * 0.15"
          class="group relative overflow-hidden rounded-2xl border border-white/40 bg-card p-8 text-center shadow-sm transition-all duration-300 hover:-translate-y-2 hover:shadow-xl dark:border-white/5"
        >
          <div class="absolute -top-12 -right-12 h-24 w-24 rounded-full bg-primary/5 transition-transform group-hover:scale-150"></div>

          <div
            class="icon-float mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-primary/10 text-primary shadow-inner"
          >
            <svg [lucideIcon]="pillar.icon" class="h-8 w-8"></svg>
          </div>
          <h3 class="font-display text-xl font-bold tracking-tight">
            {{ t(pillar.titleKey) }}
          </h3>
          <p class="mt-3 text-base leading-relaxed text-muted-foreground">
            {{ t(pillar.descriptionKey) }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
