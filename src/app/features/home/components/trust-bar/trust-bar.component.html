<section *transloco="let t" class="bg-secondary py-6">
  <div class="container px-4">
    <div class="flex items-center justify-center gap-8 sm:flex-row sm:gap-16">
      <div ahramAnimate="scale-in" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">22</span>
        <span class="text-sm text-secondary-foreground">{{ t('home.trustBar.projects') }}</span>
      </div>
      <div class="h-8 w-px bg-secondary-foreground/20 sm:block"></div>
      <div ahramAnimate="scale-in" [animateDelay]="0.15" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">+300</span>
        <span class="text-sm text-secondary-foreground">{{ t('home.trustBar.units') }}</span>
      </div>
      <div class="h-8 w-px bg-secondary-foreground/20 sm:block"></div>
      <div ahramAnimate="scale-in" [animateDelay]="0.3" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">+260</span>
        <span class="text-sm text-secondary-foreground">{{ t('about.stats.clients') }}</span>
      </div>
    </div>
  </div>
</section>
