<section *transloco="let t" class="bg-secondary py-10 md:py-12">
  <div class="container px-4">
    <div class="grid grid-cols-1 gap-8 sm:grid-cols-3 sm:gap-4 md:gap-12">
      @for (stat of stats; track stat.labelKey; let i = $index) {
        <div
          ahramAnimate="fade-up"
          [animateDelay]="i * 0.1"
          class="flex flex-col items-center justify-center text-center"
        >
          <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-primary/10 text-primary transition-transform hover:scale-110">
            <svg [lucideIcon]="stat.icon" class="h-7 w-7"></svg>
          </div>
          <div class="flex flex-col">
            <span class="font-display text-4xl font-bold tracking-tight text-primary">
              {{ stat.suffix }}{{ stat.signal() }}
            </span>
            <span class="mt-1 text-sm font-medium text-secondary-foreground/80">
              {{ t(stat.labelKey) }}
            </span>
          </div>
        </div>

        @if (i < stats.length - 1) {
          <div class="hidden h-16 w-px bg-secondary-foreground/10 sm:block"></div>
        }
      }
    </div>
  </div>
</section>
