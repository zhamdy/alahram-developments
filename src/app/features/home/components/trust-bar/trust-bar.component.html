<section *transloco="let t" class="bg-secondary py-6">
  <div class="container px-4">
    <div class="flex flex-col items-center justify-center gap-8 sm:flex-row sm:gap-16">
      <div ahramAnimate="scale-in" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">3</span>
        <span class="text-sm text-secondary-foreground">{{ t('home.trustBar.projects') }}</span>
      </div>
      <div class="hidden h-8 w-px bg-secondary-foreground/20 sm:block"></div>
      <div ahramAnimate="scale-in" [animateDelay]="0.15" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">+50</span>
        <span class="text-sm text-secondary-foreground">{{ t('home.trustBar.units') }}</span>
      </div>
      <div class="hidden h-8 w-px bg-secondary-foreground/20 sm:block"></div>
      <div ahramAnimate="scale-in" [animateDelay]="0.3" class="text-center">
        <span class="block text-3xl font-bold text-primary font-display">+5</span>
        <span class="text-sm text-secondary-foreground">{{ t('home.trustBar.years') }}</span>
      </div>
    </div>
  </div>
</section>
