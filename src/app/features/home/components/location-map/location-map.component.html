<section *transloco="let t" class="section-spacing">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 text-center">
      <h2 class="font-display text-3xl font-bold md:text-4xl">
        {{ t('home.location.title') }}
      </h2>
      <p class="mt-4 text-muted-foreground">
        {{ t('home.location.subtitle') }}
      </p>
    </div>

    <div
      ahramAnimate="scale-in"
      [animateDelay]="0.2"
      class="overflow-hidden rounded-xl border border-border shadow-sm"
    >
      @if (platform.isBrowser) {
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27532.149888656117!2d30.58132743135986!3d30.393021074422872!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14589702c387a7c7%3A0xb61501dc2ae959e3!2z2YXZiNmEINiv2KfYsSDZhdi12LE!5e0!3m2!1sar!2seg!4v1774327810639!5m2!1sar!2seg"
          class="h-80 w-full md:h-96"
          style="border: 0"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          [title]="t('home.location.mapTitle')"
        ></iframe>
      } @else {
        <div class="flex h-80 items-center justify-center bg-muted md:h-96">
          <p class="text-muted-foreground">{{ t('home.location.mapLoading') }}</p>
        </div>
      }
    </div>

    <div
      ahramAnimate="fade-up"
      [animateDelay]="0.4"
      class="mt-6 flex flex-col items-center gap-2 text-center"
    >
      <div class="flex items-center gap-2 text-muted-foreground">
        <svg lucideMapPin class="h-5 w-5 text-primary"></svg>
        <span>{{ t('home.location.address') }}</span>
      </div>
    </div>
  </div>
</section>
