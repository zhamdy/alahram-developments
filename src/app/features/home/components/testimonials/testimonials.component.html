<section *transloco="let t" class="bg-muted/30 section-spacing">
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 text-center">
      <h2 class="font-display text-3xl font-bold md:text-4xl">
        {{ t('home.testimonials.title') }}
      </h2>
      <p class="mt-4 text-muted-foreground">
        {{ t('home.testimonials.subtitle') }}
      </p>
    </div>

    <div ahramAnimate="fade-up" [animateDelay]="0.2" class="testimonials-swiper">
      <swiper-container
        init="false"
        slides-per-view="1"
        space-between="24"
        pagination="true"
        loop="true"
        autoplay-delay="5000"
        autoplay-disable-on-interaction="false"
        breakpoints='{"640":{"slidesPerView":1},"768":{"slidesPerView":2},"1024":{"slidesPerView":3}}'
        class="pb-12"
      >
        @for (item of testimonials(); track item.id; let i = $index) {
          <swiper-slide class="h-auto">
            <div
              class="card-hover flex h-full flex-col justify-between rounded-2xl border border-white/20 bg-card/60 p-8 shadow-sm backdrop-blur-sm"
            >
              <div>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="mb-6 h-10 w-10 text-primary/20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10H14.017zM0 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151C7.546 6.068 5.983 8.789 5.983 11H10v10H0z"
                  />
                </svg>
                <p class="text-lg leading-relaxed text-foreground/90 italic">
                  "{{ item.quote }}"
                </p>
              </div>
              <div class="mt-8 flex items-center gap-4">
                <div
                  class="flex h-12 w-12 items-center justify-center rounded-full bg-primary/10 border border-primary/20 shadow-inner"
                >
                  <span class="text-base font-bold text-primary">{{ item.name.charAt(0) }}</span>
                </div>
                <div class="flex flex-col">
                  <span class="text-base font-bold">{{ item.name }}</span>
                  <span class="text-xs text-muted-foreground">{{ t('home.testimonials.verifiedCustomer') }}</span>
                </div>
              </div>
            </div>
          </swiper-slide>
        }
      </swiper-container>
    </div>
  </div>
</section>
