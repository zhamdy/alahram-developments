<section
  *transloco="let t"
  class="section-spacing"
  style="
    background-image: url('assets/images/zones.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: rgba(0, 0, 0, 0.5);
    background-blend-mode: overlay;
  "
>
  <div class="container px-4">
    <div ahramAnimate="fade-up" class="mb-12 text-center">
      <h2 class="font-display text-3xl font-bold md:text-4xl">
        {{ t('zones.title') }}
      </h2>
      <p class="mt-4 text-white">
        {{ t('zones.subtitle') }}
      </p>
    </div>

    <div ahramAnimate="fade-up" [animateDelay]="0.2" class="zones-swiper overflow-hidden">
      <swiper-container
        init="false"
        slides-per-view="1"
        space-between="24"
        navigation="true"
        loop="true"
        autoplay-delay="4000"
        autoplay-disable-on-interaction="false"
        breakpoints='{"640":{"slidesPerView":2},"1024":{"slidesPerView":3},"1280":{"slidesPerView":4}}'
      >
        @for (zone of zones(); track zone.slug) {
          <swiper-slide>
            <div
              class="card-hover group flex h-full flex-col overflow-hidden rounded-xl border border-border bg-card shadow-sm"
            >
              <div class="img-zoom relative aspect-4/3 overflow-hidden bg-muted">
                <img
                  [ngSrc]="zone.imageUrl"
                  [alt]="zone.name"
                  ahramFallback
                  fill
                  sizes="(max-width: 640px) 100vw, (max-width: 1024px) 50vw, (max-width: 1280px) 33vw, 25vw"
                  class="object-cover"
                />
                <div class="absolute inset-0 flex items-end p-4">
                  <span
                    class="rounded-md bg-primary/90 px-3 py-1 text-xs font-semibold text-primary-foreground"
                  >
                    {{ t('zones.projectsCount', { count: zone.projectCount }) }}
                  </span>
                </div>
              </div>
              <div class="flex flex-1 flex-col p-5">
                <h3 class="font-display text-lg font-semibold">
                  {{ zone.name }}
                </h3>
                <p class="mt-2 line-clamp-2 text-sm text-muted-foreground">
                  {{ zone.description }}
                </p>
                <a
                  [routerLink]="'/projects/' + zone.slug | localizeRoute"
                  class="link-underline mt-auto inline-flex items-center gap-1 pt-4 text-sm font-semibold text-primary"
                >
                  {{ t('zones.browseZone') }}
                  <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
                </a>
              </div>
            </div>
          </swiper-slide>
        }
      </swiper-container>
    </div>
  </div>
</section>
