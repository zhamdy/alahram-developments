<section
  *transloco="let t"
  class="hero-section relative overflow-hidden"
>
  <div class="absolute inset-0 w-full h-full">
    <img
      srcset="
        assets/images/hero-bg-640w.webp   640w,
        assets/images/hero-bg-1024w.webp 1024w,
        assets/images/hero-bg-1920w.webp 1920w
      "
      sizes="100vw"
      src="assets/images/hero-bg-1920w.webp"
      [alt]="t('home.hero.imageAlt')"
      fetchpriority="high"
      decoding="async"
      class="absolute inset-0 h-full w-full object-cover"
    />
  </div>

  <div class="hero-overlay absolute inset-0"></div>

  <div
    class="relative z-10 container flex min-h-[90vh] flex-col items-center justify-center px-4 pb-20 pt-36 md:items-start md:pb-28 lg:pt-44"
  >
    <div class="flex max-w-3xl flex-col">
      <span
        ahramAnimate="fade-up"
        class="eyebrow mb-4 text-primary/80"
      >
        {{ t('home.hero.eyebrow') }}
      </span>
      <h1
        ahramAnimate="fade-up"
        [animateDelay]="0.1"
        class="font-display text-4xl font-bold leading-tight text-white sm:text-5xl md:text-6xl lg:text-7xl"
      >
        {{ t('home.hero.title') }}
      </h1>
      <p
        ahramAnimate="fade-up"
        [animateDelay]="0.25"
        class="mt-5 max-w-xl text-lg text-white/80 sm:text-xl"
      >
        {{ t('home.hero.subtitle') }}
      </p>
      <div
        ahramAnimate="fade-up"
        [animateDelay]="0.4"
        class="mt-10 flex flex-col gap-4 sm:flex-row"
      >
        <a
          [routerLink]="'/projects' | localizeRoute"
          class="btn-premium btn-glow inline-flex items-center justify-center rounded-xl bg-primary px-10 py-4 text-base font-bold text-primary-foreground sm:px-12"
        >
          {{ t('home.hero.browseProjects') }}
        </a>
        <a
          [routerLink]="'/contact' | localizeRoute"
          class="btn-outline-premium inline-flex items-center justify-center rounded-xl border border-white/40 px-10 py-4 text-base font-bold text-white sm:px-12"
        >
          {{ t('home.hero.contactUs') }}
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll cue -->
  <div
    class="scroll-cue absolute bottom-8 start-1/2 z-10 -translate-x-1/2 flex flex-col items-center gap-1"
    aria-hidden="true"
  >
    <span class="text-xs font-medium tracking-widest text-white/50 uppercase">{{ t('home.hero.scrollCue') }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white/50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </div>
</section>
