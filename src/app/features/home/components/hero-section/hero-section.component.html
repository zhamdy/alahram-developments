<section *transloco="let t" class="hero-section relative overflow-hidden">
  <img
    srcset="assets/images/hero-bg-640w.webp 640w, assets/images/hero-bg-1024w.webp 1024w, assets/images/hero-bg-1920w.webp 1920w"
    sizes="100vw"
    src="assets/images/hero-bg-1920w.webp"
    [alt]="t('home.hero.imageAlt')"
    fetchpriority="high"
    decoding="async"
    class="absolute inset-0 h-full w-full object-cover"
  />
  <div class="hero-overlay absolute inset-0"></div>

  <div class="relative z-10 container flex min-h-[85vh] flex-col justify-end px-4 pb-16 pt-32 md:pb-24">
    <h1 ahramAnimate="fade-up" class="font-display max-w-3xl text-4xl font-bold leading-tight text-white sm:text-5xl md:text-6xl lg:text-7xl">
      {{ t('home.hero.title') }}
    </h1>
    <p ahramAnimate="fade-up" [animateDelay]="0.2" class="mt-4 max-w-xl text-lg text-white/80 sm:text-xl">
      {{ t('home.hero.subtitle') }}
    </p>
    <div ahramAnimate="fade-up" [animateDelay]="0.4" class="mt-8 flex flex-col gap-4 sm:flex-row">
      <a
        [routerLink]="'/projects' | localizeRoute"
        class="btn-glow inline-flex items-center justify-center rounded-lg bg-primary px-8 py-3.5 text-base font-semibold text-primary-foreground transition-colors hover:bg-primary/90"
      >
        {{ t('home.hero.browseProjects') }}
      </a>
      <a
        [routerLink]="'/contact' | localizeRoute"
        class="inline-flex items-center justify-center rounded-lg border-2 border-white/70 px-8 py-3.5 text-base font-semibold text-white transition-colors hover:bg-white/10"
      >
        {{ t('home.hero.contactUs') }}
      </a>
    </div>
  </div>
</section>
