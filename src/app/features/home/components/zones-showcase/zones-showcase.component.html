<section
  *transloco="let t"
  aria-labelledby="zones-heading"
  class="section-spacing-lg bg-muted/30"
>
  <div class="container px-4">

    <!-- Header -->
    <div ahramAnimate="fade-up" class="mb-14 flex flex-col items-center text-center">
      <span class="eyebrow">{{ t('home.zones.eyebrow') }}</span>
      <h2
        id="zones-heading"
        class="section-title-xl mt-3"
      >
        {{ t('home.zones.title') }}
      </h2>
      <span class="editorial-rule mt-5 mx-auto"></span>
      <p class="mx-auto mt-6 max-w-2xl text-lg text-muted-foreground">
        {{ t('home.zones.subtitle') }}
      </p>
    </div>

    <!-- Zone grid -->
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4">
      @for (zone of zones; track zone.slug; let i = $index) {
        <a
          [routerLink]="['/projects', zone.slug] | localizeRoute"
          ahramAnimate="fade-up"
          [animateDelay]="i * 0.07"
          class="card-hover group relative block overflow-hidden rounded-2xl shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
        >
          <!-- Zone photo -->
          <div class="img-zoom relative aspect-[4/3] overflow-hidden bg-muted">
            <img
              [ngSrc]="zone.imageUrl"
              [alt]=""
              ahramFallback
              fill
              ngSrcset="400w, 640w, 800w"
              sizes="(max-width: 640px) 100vw, (max-width: 1024px) 50vw, 25vw"
              class="object-cover transition-transform duration-500 group-hover:scale-110"
            />
            <!-- Gradient overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-secondary/90 via-secondary/30 to-transparent"></div>
          </div>

          <!-- Card content -->
          <div class="absolute bottom-0 start-0 end-0 p-5">
            <div class="flex items-center gap-1.5 text-primary/80">
              <svg lucideMapPin class="h-3.5 w-3.5 shrink-0"></svg>
              <span class="text-xs font-semibold tracking-wide text-primary/80">{{ t('home.zones.cardCta') }}</span>
            </div>
            <h3 class="mt-1 font-display text-base font-bold leading-snug text-white">
              {{ t(zone.nameKey) }}
            </h3>
            <p class="mt-1 line-clamp-2 text-xs text-white/65">
              {{ t(zone.descriptionKey) }}
            </p>
          </div>
        </a>
      }
    </div>

    <!-- Section CTA -->
    <div ahramAnimate="fade-up" [animateDelay]="0.5" class="mt-12 flex justify-center">
      <a
        [routerLink]="'/projects' | localizeRoute"
        class="btn-glow inline-flex items-center gap-2 rounded-xl border border-primary px-8 py-3.5 text-sm font-semibold text-primary transition-colors hover:bg-primary hover:text-primary-foreground"
      >
        {{ t('home.zones.viewAll') }}
        <svg lucideChevronRight class="h-4 w-4 rtl:rotate-180"></svg>
      </a>
    </div>

  </div>
</section>
