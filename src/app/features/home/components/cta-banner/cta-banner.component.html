<section
  *transloco="let t"
  class="relative overflow-hidden section-spacing-lg"
  style="
    background-image: url('assets/images/projects/project-865-hero.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-color: rgba(0,0,0,0.72);
    background-blend-mode: overlay;
  "
>
  <!-- Radial glow accent -->
  <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_at_center,oklch(0.62_0.16_55_/_0.15)_0%,transparent_70%)]"></div>

  <div class="container relative px-4">
    <div class="grid items-center gap-12 lg:grid-cols-2 lg:gap-20">

      <!-- Text + Buttons -->
      <div ahramAnimate="fade-right" class="flex flex-col text-center lg:text-start">
        <span class="eyebrow text-primary/80">{{ t('home.cta.eyebrow') }}</span>
        <h2 class="section-title-xl mt-4 text-white">{{ t('home.cta.title') }}</h2>
        <span class="editorial-rule mt-5 lg:me-auto"></span>
        <p class="mx-auto mt-6 max-w-md text-lg text-white/70 lg:mx-0">
          {{ t('home.cta.subtitle') }}
        </p>

        <div class="mt-10 flex flex-col items-center gap-4 sm:flex-row lg:justify-start">
          <a
            href="https://wa.me/201153516871"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-glow inline-flex w-full items-center justify-center gap-2.5 rounded-xl bg-whatsapp px-8 py-3.5 text-base font-semibold text-white transition-opacity hover:opacity-90 sm:w-auto"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.75.75 0 00.917.918l4.458-1.495A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.37 0-4.567-.696-6.418-1.889l-.45-.294-2.903.973.974-2.903-.294-.45A9.955 9.955 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/>
            </svg>
            {{ t('home.cta.whatsapp') }}
          </a>
          <a
            href="tel:+201153516871"
            class="inline-flex w-full items-center justify-center gap-2.5 rounded-xl border border-white/30 px-8 py-3.5 text-base font-semibold text-white backdrop-blur-sm transition-colors hover:border-white/60 hover:bg-white/10 sm:w-auto"
          >
            <svg lucidePhone class="h-5 w-5 shrink-0"></svg>
            {{ t('home.cta.call') }}
          </a>
        </div>
      </div>

      <!-- Form -->
      <div ahramAnimate="fade-left" [animateDelay]="0.2">
        <ahram-contact-form />
      </div>

    </div>
  </div>
</section>
