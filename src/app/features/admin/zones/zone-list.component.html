<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-foreground">Zones</h1>
    <a
      routerLink="/admin/zones/new"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-primary-foreground font-medium text-sm hover:bg-primary/90 transition-colors"
    >
      <svg lucidePlus class="w-4 h-4"></svg>
      Add Zone
    </a>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center h-40 text-muted-foreground">Loading...</div>
  } @else {
    <div class="bg-card rounded-xl border border-border overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-muted">
            <tr>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Image</th>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Name (AR)</th>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Name (EN)</th>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Slug</th>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Projects</th>
              <th class="text-left px-4 py-3 font-medium text-muted-foreground">Order</th>
              <th class="text-right px-4 py-3 font-medium text-muted-foreground">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-border">
            @for (z of zones(); track z.id) {
              <tr class="hover:bg-muted/50">
                <td class="px-4 py-3">
                  @if (z.imageUrl) {
                    <img [src]="z.imageUrl" [alt]="z.nameEn" class="w-12 h-10 object-cover rounded" />
                  } @else {
                    <div class="w-12 h-10 bg-muted rounded flex items-center justify-center text-muted-foreground text-xs">—</div>
                  }
                </td>
                <td class="px-4 py-3 text-foreground font-medium" dir="rtl">{{ z.nameAr }}</td>
                <td class="px-4 py-3 text-foreground">{{ z.nameEn }}</td>
                <td class="px-4 py-3 text-muted-foreground font-mono text-xs">{{ z.slug }}</td>
                <td class="px-4 py-3">
                  <span class="px-2 py-0.5 rounded-full bg-primary/10 text-primary text-xs font-medium">{{ z.projectCount ?? 0 }}</span>
                </td>
                <td class="px-4 py-3 text-muted-foreground">{{ z.sortOrder }}</td>
                <td class="px-4 py-3 text-right">
                  <div class="flex items-center justify-end gap-1">
                    <a
                      [routerLink]="'/admin/zones/' + z.id + '/edit'"
                      class="p-1.5 rounded-lg hover:bg-muted text-muted-foreground hover:text-foreground transition-colors"
                      title="Edit"
                    >
                      <svg lucideEdit class="w-4 h-4"></svg>
                    </a>
                    <button
                      (click)="deleteZone(z.id, z.nameEn)"
                      class="p-1.5 rounded-lg hover:bg-destructive/10 text-muted-foreground hover:text-destructive transition-colors"
                      title="Delete"
                    >
                      <svg lucideTrash2 class="w-4 h-4"></svg>
                    </button>
                  </div>
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="7" class="px-4 py-8 text-center text-muted-foreground">No zones found</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
