<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-foreground">Gallery</h1>
  </div>

  <!-- Upload section -->
  <div class="bg-card rounded-xl border border-border p-6 mb-6 space-y-4">
    <h2 class="text-lg font-semibold text-foreground">Upload Image / Video</h2>
    <div class="flex flex-wrap items-end gap-4">
      <div>
        <label class="block text-sm font-medium text-foreground mb-1">Project</label>
        <select [(ngModel)]="selectedProjectId" class="px-3 py-2 rounded-lg border border-input bg-background text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring">
          <option [value]="0" disabled>Select project...</option>
          @for (p of projects(); track p.id) {
            <option [value]="p.id">{{ p.nameEn }}</option>
          }
        </select>
      </div>
      <div>
        <label
          class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-primary-foreground text-sm font-medium cursor-pointer hover:bg-primary/90 transition-colors"
          [class.opacity-50]="!selectedProjectId || uploading()"
        >
          <svg lucideUpload class="w-4 h-4"></svg>
          {{ uploading() ? 'Uploading...' : 'Upload File' }}
          <input type="file" accept="image/*,video/mp4,video/webm,video/quicktime" (change)="onUpload($event)" class="hidden" [disabled]="!selectedProjectId || uploading()" />
        </label>
      </div>
    </div>
  </div>

  <!-- Filter -->
  <div class="flex items-center gap-3 mb-4">
    <label class="text-sm font-medium text-foreground">Filter by project:</label>
    <select [(ngModel)]="filterProjectId" (ngModelChange)="loadImages()" class="px-3 py-2 rounded-lg border border-input bg-background text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring">
      <option [value]="0">All Projects</option>
      @for (p of projects(); track p.id) {
        <option [value]="p.id">{{ p.nameEn }}</option>
      }
    </select>
  </div>

  <!-- Gallery grid -->
  @if (loading()) {
    <div class="flex items-center justify-center h-40 text-muted-foreground">Loading...</div>
  } @else {
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
      @for (img of images(); track img.id) {
        <div class="bg-card rounded-xl border border-border overflow-hidden group">
          <div class="aspect-[4/3] relative">
            @if (img.mediaType === 'video') {
              <video [src]="img.imageUrl" class="w-full h-full object-cover" muted preload="metadata"></video>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-10 h-10 rounded-full bg-black/60 flex items-center justify-center">
                  <svg lucidePlay class="w-5 h-5 text-white"></svg>
                </div>
              </div>
            } @else {
              <img [src]="img.imageUrl" [alt]="img.captionEn || 'Gallery image'" class="w-full h-full object-cover" />
            }
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors flex items-center justify-center">
              <button
                (click)="deleteImage(img.id)"
                class="opacity-0 group-hover:opacity-100 p-2 rounded-lg bg-destructive text-destructive-foreground transition-opacity"
                title="Delete"
              >
                <svg lucideTrash2 class="w-4 h-4"></svg>
              </button>
            </div>
          </div>
          <div class="p-3">
            <p class="text-xs text-muted-foreground truncate">{{ img.projectNameEn || img.projectSlug }}</p>
          </div>
        </div>
      } @empty {
        <div class="col-span-full text-center py-12 text-muted-foreground">
          No gallery images found
        </div>
      }
    </div>
  }
</div>
