<!-- Mobile toggle button -->
<button
  (click)="toggleMobile()"
  class="lg:hidden fixed top-4 left-4 z-50 p-2 rounded-lg bg-card shadow-md border border-border"
  aria-label="Toggle menu"
>
  @if (mobileOpen()) {
    <svg lucideX class="w-5 h-5 text-foreground"></svg>
  } @else {
    <svg lucideMenu class="w-5 h-5 text-foreground"></svg>
  }
</button>

<!-- Sidebar backdrop on mobile -->
@if (mobileOpen()) {
  <div
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="toggleMobile()"
  ></div>
}

<!-- Sidebar -->
<aside
  class="fixed lg:sticky top-0 left-0 z-40 h-screen w-64 bg-card border-r border-border flex flex-col transition-transform duration-200"
  [class.-translate-x-full]="!mobileOpen()"
  [class.translate-x-0]="mobileOpen()"
  [class.lg:translate-x-0]="true"
>
  <!-- Logo -->
  <div class="p-6 border-b border-border">
    <h2 class="text-lg font-bold text-foreground font-display">Al-Ahram Admin</h2>
    <p class="text-xs text-muted-foreground mt-0.5">Content Management</p>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 p-4 space-y-1">
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-primary/10 text-primary"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-muted-foreground hover:bg-muted hover:text-foreground transition-colors"
        (click)="mobileOpen.set(false)"
      >
        @switch (item.icon) {
          @case ('dashboard') { <svg lucideLayoutDashboard class="w-5 h-5"></svg> }
          @case ('projects') { <svg lucideBuilding2 class="w-5 h-5"></svg> }
          @case ('zones') { <svg lucideMap class="w-5 h-5"></svg> }
          @case ('gallery') { <svg lucideImage class="w-5 h-5"></svg> }
          @case ('contacts') { <svg lucideMessageSquare class="w-5 h-5"></svg> }
        }
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="p-4 border-t border-border">
    <button
      (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-medium text-muted-foreground hover:bg-destructive/10 hover:text-destructive transition-colors"
    >
      <svg lucideLogOut class="w-5 h-5"></svg>
      Sign Out
    </button>
    <a
      href="/"
      class="flex items-center gap-3 mt-1 px-3 py-2 text-xs text-muted-foreground hover:text-primary transition-colors"
    >
      ← Back to website
    </a>
  </div>
</aside>
