<div class="min-h-screen flex items-center justify-center bg-muted p-4" dir="ltr">
  <div class="w-full max-w-md bg-card rounded-2xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-foreground font-display">Al-Ahram Admin</h1>
      <p class="text-muted-foreground mt-2">Sign in to manage your content</p>
    </div>

    @if (error()) {
      <div class="mb-4 p-3 rounded-lg bg-destructive/10 text-destructive text-sm">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-foreground mb-1.5">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          class="w-full px-4 py-2.5 rounded-lg border border-input bg-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          placeholder="admin@alahram.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-foreground mb-1.5">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full px-4 py-2.5 rounded-lg border border-input bg-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2.5 px-4 rounded-lg bg-primary text-primary-foreground font-semibold hover:bg-primary/90 transition-colors disabled:opacity-50"
      >
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <p class="text-center text-xs text-muted-foreground mt-6">
      <a href="/" class="hover:text-primary transition-colors">← Back to website</a>
    </p>
  </div>
</div>
