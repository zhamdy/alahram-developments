<section *transloco="let t" class="py-16 md:py-24">
  <div class="container px-4">
    <!-- Page Header -->
    <div class="mb-12 text-center">
      <h1 class="font-display text-3xl font-bold md:text-4xl lg:text-5xl">
        {{ t('projects.title') }}
      </h1>
      <p class="mt-4 text-lg text-muted-foreground">
        {{ t('projects.subtitle') }}
      </p>
    </div>

    <!-- Projects Grid -->
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
      @for (project of projects; track project.id) {
        <div
          class="group overflow-hidden rounded-xl border border-border bg-card shadow-sm transition-shadow hover:shadow-lg"
        >
          <!-- Project Image -->
          <div class="relative aspect-video overflow-hidden bg-muted">
            <img
              [src]="project.imageUrl"
              [alt]="t(project.nameKey)"
              loading="lazy"
              class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
            />
            <div class="absolute inset-0 flex items-end p-4">
              <span
                class="rounded-md bg-primary/90 px-3 py-1 text-xs font-semibold text-primary-foreground"
              >
                {{ t(project.statusKey) }}
              </span>
            </div>
          </div>

          <!-- Card Content -->
          <div class="p-6">
            <h2 class="font-display text-xl font-semibold">
              {{ t(project.nameKey) }}
            </h2>
            <p class="mt-2 text-sm text-muted-foreground">
              {{ t(project.descriptionKey) }}
            </p>

            <!-- Location -->
            <div
              class="mt-3 flex items-center gap-1 text-sm text-muted-foreground"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                />
                <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              {{ t(project.locationKey) }}
            </div>

            <!-- View Details Link -->
            <a
              [routerLink]="['/projects', project.slug]"
              class="mt-4 inline-flex items-center gap-1 text-sm font-semibold text-primary transition-colors hover:text-primary/80"
            >
              {{ t('projects.viewDetails') }}
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 rtl:rotate-180"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6" />
              </svg>
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
